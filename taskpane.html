<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <title>Broken Link Checker</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; }
        button { background-color: #0078d4; color: white; border: none; padding: 10px 20px; cursor: pointer; width: 100%; }
        button:hover { background-color: #005a9e; }
        #status { margin-top: 15px; font-weight: bold; }
        #broken-links-list { margin-top: 10px; color: red; }
    </style>
</head>
<body>
    <h3>Broken Link Checker</h3>
    <button id="checkLinksBtn">Scan Document</button>
    <div id="status">Ready</div>
    <div id="broken-links-container" style="display:none;">
        <p>Broken Links Found:</p>
        <ul id="broken-links-list"></ul>
    </div>
    <script src="taskpane.js"></script>
</body>
</html>
