<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <title>Broken Link Checker</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; background-color: #f4f4f4; }
        h3 { color: #333; }
        button { background-color: #0078d4; color: white; border: none; padding: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background-color: #005a9e; }
        #status { margin-top: 15px; font-style: italic; color: #555; }
        #broken-links-container { margin-top: 20px; border-top: 1px solid #ddd; padding-top: 10px; }
        #broken-links-list { padding-left: 0; list-style: none; word-wrap: break-word; }
    </style>
</head>
<body>
    <h3>Link Checker</h3>
    <button id="checkLinksBtn">Scan Document</button>
    <div id="status">Ready</div>
    <div id="broken-links-container" style="display:none;">
        <strong>Broken Links (Click to find):</strong>
        <ul id="broken-links-list"></ul>
    </div>
    <script src="taskpane.js"></script>
</body>
</html>
